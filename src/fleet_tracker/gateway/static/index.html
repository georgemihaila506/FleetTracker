<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Fleet Tracker</title>
<link rel="stylesheet" href="/static/vendor/leaflet.css" />
<style>
  html, body { margin: 0; height: 100%; font: 14px/1.4 system-ui, sans-serif; }
  #map { position: absolute; inset: 0; }
  #hud {
    position: absolute; z-index: 1000; top: 12px; right: 12px;
    background: rgba(255,255,255,.92); border-radius: 8px; padding: 10px 14px;
    box-shadow: 0 1px 6px rgba(0,0,0,.3); min-width: 150px;
  }
  #hud h1 { margin: 0 0 6px; font-size: 15px; }
  #hud .row { display: flex; justify-content: space-between; gap: 16px; }
  #hud .num { font-variant-numeric: tabular-nums; font-weight: 600; }
  #dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%;
         background: #bbb; vertical-align: middle; margin-right: 5px; }
  #dot.on { background: #22c55e; }
  #hud .sep { border: none; border-top: 1px solid #eee; margin: 8px 0; }
  #hud .top { margin-top: 4px; font-size: 12px; color: #555; }
  #hud .top div { display: flex; justify-content: space-between; gap: 16px; }

  /* alert toasts, bottom-left, newest on top, auto-fading */
  #toasts {
    position: absolute; z-index: 1000; left: 12px; bottom: 12px;
    display: flex; flex-direction: column-reverse; gap: 6px; max-width: 320px;
  }
  .toast {
    padding: 8px 12px; border-radius: 6px; color: #fff; font-weight: 600;
    font-size: 13px; box-shadow: 0 1px 6px rgba(0,0,0,.3);
    animation: toastfade 5s ease forwards;
  }
  .toast.enter { background: #16a34a; }  /* green */
  .toast.exit  { background: #d97706; }  /* amber */
  @keyframes toastfade {
    0%   { opacity: 0; transform: translateY(6px); }
    6%   { opacity: 1; transform: none; }
    85%  { opacity: 1; }
    100% { opacity: 0; }
  }
</style>
</head>
<body>
<div id="map"></div>
<div id="hud">
  <h1><span id="dot"></span>Fleet Tracker</h1>
  <div class="row"><span>vehicles</span><span class="num" id="n-veh">0</span></div>
  <div class="row"><span>messages</span><span class="num" id="n-msg">0</span></div>
  <div class="row"><span>alerts</span><span class="num" id="n-alert">0</span></div>
  <div class="row"><span>status</span><span class="num" id="status">…</span></div>
  <hr class="sep" />
  <div class="row"><span>fleet dist</span><span class="num" id="s-dist">…</span></div>
  <div class="row"><span>fleet avg</span><span class="num" id="s-avg">…</span></div>
  <div id="s-top" class="top"></div>
</div>
<div id="toasts"></div>

<script src="/static/vendor/leaflet.js"></script>
<script>
  // --- map -----------------------------------------------------------------
  const map = L.map("map").setView([44.4268, 26.1025], 13); // Bucharest
  // Basemap tiles come from OpenStreetMap over the network (the only runtime
  // internet dependency; the vehicle dots work with or without it).
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 19,
    attribution: "&copy; OpenStreetMap contributors",
  }).addTo(map);

  // --- geofence zones (drawn once from the gateway's /zones endpoint) -------
  // One source of truth: these polygons come from consumers/zones.py, the same
  // definitions the geofence consumer edge-detects against.
  fetch("/zones").then((r) => r.json()).then((zones) => {
    for (const z of zones) {
      L.polygon(z.polygon, {
        color: "#7c3aed", weight: 2, fillColor: "#7c3aed", fillOpacity: 0.08,
      }).addTo(map).bindTooltip(z.name, { sticky: true });
    }
  });

  // --- state (conflated: latest position per vehicle) ----------------------
  const latest = new Map();   // vehicle_id -> position object (newest only)
  const markers = new Map();  // vehicle_id -> Leaflet circleMarker
  const offline = new Set();  // vehicle_ids currently offline (drawn grey)
  let dirty = false;          // something changed since last repaint
  let msgCount = 0;

  const nVeh = document.getElementById("n-veh");
  const nMsg = document.getElementById("n-msg");
  const nAlert = document.getElementById("n-alert");
  const statusEl = document.getElementById("status");
  const dot = document.getElementById("dot");
  const toastsEl = document.getElementById("toasts");
  let alertCount = 0;

  function colorFor(speed) {
    // slow = amber, cruising = green, fast = blue — purely cosmetic.
    if (speed == null) return "#3b82f6";
    if (speed < 6) return "#f59e0b";
    if (speed < 14) return "#22c55e";
    return "#2563eb";
  }

  // --- repaint on animation frames, not per message ------------------------
  // Batch + conflate (ADR-0007): many messages may arrive between frames; we
  // only ever draw each vehicle's newest position, once per frame.
  function paint() {
    if (dirty) {
      for (const [id, p] of latest) {
        let m = markers.get(id);
        if (!m) {
          m = L.circleMarker([p.lat, p.lon], {
            radius: 6, weight: 1, color: "#fff", fillOpacity: 0.9,
          }).addTo(map);
          m.bindTooltip(id, { direction: "top", offset: [0, -6] });
          markers.set(id, m);
        } else {
          m.setLatLng([p.lat, p.lon]);
        }
        m.setStyle({
          fillColor: offline.has(id) ? "#9ca3af" : colorFor(p.speed),
          fillOpacity: offline.has(id) ? 0.45 : 0.9,
        });
      }
      nVeh.textContent = latest.size;
      nMsg.textContent = msgCount;
      dirty = false;
    }
    requestAnimationFrame(paint);
  }
  requestAnimationFrame(paint);

  // --- alerts: a toast + a brief marker flash ------------------------------
  function handleAlert(a) {
    alertCount++;
    nAlert.textContent = alertCount;

    // Flash the vehicle's marker so you can see WHERE the crossing happened.
    const m = markers.get(a.vehicle_id);
    if (m) {
      const base = m.options.radius;
      m.setStyle({ weight: 3, color: a.kind === "enter" ? "#16a34a" : "#d97706" });
      m.setRadius(base + 5);
      setTimeout(() => { m.setRadius(base); m.setStyle({ weight: 1, color: "#fff" }); }, 1200);
    }

    const el = document.createElement("div");
    el.className = "toast " + a.kind;
    el.textContent =
      `${a.vehicle_id} ${a.kind === "enter" ? "entered" : "left"} ${a.zone}`;
    toastsEl.appendChild(el);
    setTimeout(() => el.remove(), 5000);
  }

  // --- presence: grey a vehicle that's gone offline, restore on return -----
  function handlePresence(p) {
    if (p.status === "offline") offline.add(p.vehicle_id);
    else offline.delete(p.vehicle_id);
    dirty = true;  // repaint so the marker's colour flips
  }

  // --- websocket: snapshot then live, same message shape for both ----------
  const proto = location.protocol === "https:" ? "wss:" : "ws:";
  const ws = new WebSocket(`${proto}//${location.host}/ws`);

  ws.onopen = () => { dot.classList.add("on"); statusEl.textContent = "live"; };
  ws.onmessage = (ev) => {
    const m = JSON.parse(ev.data);
    // Three message shapes share this socket, told apart by a discriminator
    // field (no envelope, so the position path stays byte-identical to M4):
    //   Alert    -> has `kind`   (enter/exit)
    //   Presence -> has `status` (offline/online)
    //   Position -> has lat/lon
    if (m.kind) {
      handleAlert(m);
      return;
    }
    if (m.status) {
      handlePresence(m);
      return;
    }
    latest.set(m.vehicle_id, m);  // conflate: newest wins
    msgCount++;
    dirty = true;
  };
  ws.onclose = () => { dot.classList.remove("on"); statusEl.textContent = "offline"; };
  ws.onerror = () => { statusEl.textContent = "error"; };

  // --- fleet stats: poll the analytics read model every 2s ------------------
  // Positions/alerts are pushed over the WS; stats are a materialized view the
  // analytics group keeps in Redis, so a simple periodic pull is the right fit.
  const sDist = document.getElementById("s-dist");
  const sAvg = document.getElementById("s-avg");
  const sTop = document.getElementById("s-top");
  async function pollStats() {
    try {
      const s = await (await fetch("/stats")).json();
      sDist.textContent = s.total_distance_km.toFixed(1) + " km";
      sAvg.textContent = s.avg_speed.toFixed(1) + " m/s";
      sTop.innerHTML = s.top
        .map((v) => `<div><span>${v.vehicle_id}</span><span>${v.km.toFixed(1)} km</span></div>`)
        .join("");
    } catch (e) { /* gateway restart / analytics not up yet — ignore */ }
  }
  setInterval(pollStats, 2000);
  pollStats();
</script>
</body>
</html>
